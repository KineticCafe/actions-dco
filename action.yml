name: 'Enforce DCO Sign-off'
description: |
  Enforce Developer Certificate of Origin (DCO) sign-off on Pull Requests.
author: 'Austin Ziegler'

inputs:
  repo-token:
    description: |
      The GitHub token for use with this action. Must have permission to read pull request
      details. When comments are enabled, add `pull-requests: write`.
    required: false
    default: ${{ github.token }}

  config:
    description: |
      Embedded TOML configuration. This is the preferred way to configure the action. See
      documentation for the full configuration reference.
    required: false
    default: ''

  exempt-authors:
    description: |
      DEPRECATED: Use the `config` input instead.

      A whitespace-separated list of email exemption patterns. Entries starting with @ are
      domain patterns; otherwise exact email match. Applied to commit author only.
    required: false
    default: ''
    deprecationMessage: |
      The exempt-authors input is deprecated. Use the config input with embedded TOML
      instead.

runs:
  using: 'node24'
  main: 'dist/dco_check.cjs'

branding:
  icon: check-circle
  color: blue
